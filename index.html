<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VLITS CGPA Calculator</title>
    <link rel="shortcut icon" href="grades.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f4f7fb;
            min-height: 100vh;
            padding: 30px 15px;
            color: #222;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.6rem;
            color: #1e3a8a;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            color: #666;
            font-size: 1rem;
        }

        .cgpa-box {
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
            text-align: center;
        }

        .cgpa-box h2 {
            color: #1e3a8a;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .cgpa-value {
            font-size: 3rem;
            font-weight: 700;
            color: #2563eb;
            margin: 15px 0;
        }

        .percentage {
            font-size: 1.2rem;
            color: #444;
        }

        .class-award {
            margin-top: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #16a34a;
        }

        .sem-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .sem-card {
            background: #fff;
            padding: 20px;
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            transition: 0.3s;
        }

        .sem-card:hover {
            transform: translateY(-4px);
        }

        .sem-card h3 {
            margin-bottom: 15px;
            color: #1e40af;
            font-size: 1.2rem;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.95rem;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .btn {
            margin-top: 30px;
            width: 100%;
            padding: 16px;
            border: none;
            background: #2563eb;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #777;
            font-size: 0.9rem;
        }

        @media(max-width:600px) {

            .header h1 {
                font-size: 2rem;
            }

            .cgpa-value {
                font-size: 2.4rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>VLITS CGPA Calculator</h1>
            <p>Calculate your complete B.Tech CGPA for all 8 semesters</p>
        </div>

        <div class="cgpa-box">
            <h2>Total CGPA</h2>

            <div class="cgpa-value" id="cgpa">
                0.00
            </div>

            <div class="percentage" id="percentage">
                Percentage: 0.00%
            </div>

            <div class="class-award" id="classAward">
                Class: -
            </div>
        </div>

        <div class="sem-grid">

            <div class="sem-card">
                <h3>Semester 1</h3>

                <div class="input-group">
                    <label>SGPA</label>
                    <input type="number" step="0.01" id="sem1">
                </div>
            </div>

            <div class="sem-card">
                <h3>Semester 2</h3>

                <div class="input-group">
                    <label>SGPA</label>
                    <input type="number" step="0.01" id="sem2">
                </div>
            </div>

            <div class="sem-card">
                <h3>Semester 3</h3>

                <div class="input-group">
                    <label>SGPA</label>
                    <input type="number" step="0.01" id="sem3">
                </div>
            </div>

            <div class="sem-card">
                <h3>Semester 4</h3>

                <div class="input-group">
                    <label>SGPA</label>
                    <input type="number" step="0.01" id="sem4">
                </div>
            </div>

            <div class="sem-card">
                <h3>Semester 5</h3>

                <div class="input-group">
                    <label>SGPA</label>
                    <input type="number" step="0.01" id="sem5">
                </div>
            </div>

            <div class="sem-card">
                <h3>Semester 6</h3>

                <div class="input-group">
                    <label>SGPA</label>
                    <input type="number" step="0.01" id="sem6">
                </div>
            </div>

            <div class="sem-card">
                <h3>Semester 7</h3>

                <div class="input-group">
                    <label>SGPA</label>
                    <input type="number" step="0.01" id="sem7">
                </div>
            </div>

            <div class="sem-card">
                <h3>Semester 8</h3>

                <div class="input-group">
                    <label>SGPA</label>
                    <input type="number" step="0.01" id="sem8">
                </div>
            </div>

        </div>

        <button class="btn" onclick="calculateCGPA()">
            Calculate CGPA
        </button>

        <div class="footer">
            Designed By <span style="font-weight: bolder; color: black;">MMV YASH</span>
        </div>

    </div>

    <script>

        function calculateCGPA() {

            let total = 0;
            let count = 0;

            for (let i = 1; i <= 8; i++) {

                let value = parseFloat(
                    document.getElementById(`sem${i}`).value
                );

                if (!isNaN(value)) {
                    total += value;
                    count++;
                }
            }

            if (count === 0) {

                alert("Please enter at least one semester SGPA");
                return;
            }

            // CGPA WITHOUT ROUNDING
            let cgpaRaw = total / count;

            let cgpa =
                Math.floor(cgpaRaw * 100) / 100;

            cgpa = cgpa.toFixed(2);

            document.getElementById("cgpa").innerText =
                cgpa;

            // Percentage WITHOUT ROUNDING
            let percentageRaw =
                10 * (cgpa - 0.75);

            let percentage =
                Math.floor(percentageRaw * 100) / 100;

            percentage = percentage.toFixed(2);

            document.getElementById("percentage").innerText =
                `Percentage: ${percentage}%`;

            // Class Award Logic
            let classAward = "";

            if (cgpa >= 7.75) {

                classAward =
                    "First Class with Distinction";
            }

            else if (cgpa >= 6.75) {

                classAward =
                    "First Class";
            }

            else if (cgpa >= 5.75) {

                classAward =
                    "Second Class";
            }

            else if (cgpa >= 4.75) {

                classAward =
                    "Pass Class";
            }

            else {

                classAward =
                    "Fail";
            }

            document.getElementById("classAward").innerText =
                `Class: ${classAward}`;
        }

    </script>

</body>

</html>
